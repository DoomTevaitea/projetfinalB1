<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>connexionmobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "page"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="css/mobile-core.css" />
    <link rel="stylesheet" href="css/mobile-transition.css" />
    <link rel="stylesheet" href="css/auth-mobile.css" />
    <link rel="stylesheet" href="css/pages/connexionmobile.css" />
  </head>
  <body>
    <main class="phone phone--light" aria-label="Connexion mobile Studiodontho">
      <a class="back-button" href="page2mobil.html" aria-label="Retour">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <section class="login-panel">
        <header class="mobile-header">
          <h1>Studiodontho</h1>
        </header>
        <p class="auth-message" id="auth-message" role="status"></p>
        <form class="login-card" id="login-only" action="#" method="post">
          <h2>Connexion</h2>
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" placeholder="exemple@mail.com" autocomplete="email" maxlength="255" required />
          <label for="login-password">Mot de passe</label>
          <div class="password-field">
            <input id="login-password" name="password" type="password" placeholder="Ton mot de passe" autocomplete="current-password" required />
            <button class="password-toggle" type="button" aria-label="Afficher le mot de passe" data-target="login-password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <button class="submit-button" type="submit">Connexion</button>
          <button class="link-button" id="forgot-open" type="button">Mot de passe oubli&eacute; ?</button>
        </form>
        <form class="login-card" id="forgot-only" action="#" method="post" hidden>
          <h2>Mot de passe oubli&eacute;</h2>
          <p class="form-help">Entre l'adresse mail de ton compte pour recevoir un lien.</p>
          <label for="forgot-email">Email</label>
          <input id="forgot-email" name="email" type="email" placeholder="exemple@mail.com" autocomplete="email" maxlength="255" required />
          <button class="submit-button" type="submit">Envoyer</button>
          <button class="link-button" id="back-to-login" type="button">Retour connexion</button>
        </form>
      </section>
    </main>
    <script>
      const form = document.querySelector("#login-only");
      const forgotForm = document.querySelector("#forgot-only");
      const message = document.querySelector("#auth-message");
      const forgotOpenButton = document.querySelector("#forgot-open");
      const backToLoginButton = document.querySelector("#back-to-login");

      function showMessage(text, type = "") {
        message.textContent = text;
        message.className = `auth-message ${type}`.trim();
      }

      function showLoginForm() {
        form.hidden = false;
        forgotForm.hidden = true;
        showMessage("");
      }

      function showForgotForm() {
        form.hidden = true;
        forgotForm.hidden = false;
        showMessage("");
      }

      async function sendJsonRequest(url, data) {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "same-origin",
          body: JSON.stringify(data)
        });
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || "Une erreur est survenue.");
        }

        return result;
      }

      document.querySelector(".password-toggle").addEventListener("click", (event) => {
        const button = event.currentTarget;
        const input = document.getElementById(button.dataset.target);
        const icon = button.querySelector("i");
        const isHidden = input.type === "password";
        input.type = isHidden ? "text" : "password";
        button.setAttribute("aria-label", isHidden ? "Cacher le mot de passe" : "Afficher le mot de passe");
        icon.className = isHidden ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
      });
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const button = form.querySelector(".submit-button");
        const defaultText = button.textContent;
        button.disabled = true;
        button.textContent = "Connexion...";
        showMessage("");
        try {
          const result = await sendJsonRequest("/api/login", Object.fromEntries(new FormData(form).entries()));
          const successMessage = result.user
            ? `${result.message} Bonjour ${result.user.prenom}.`
            : result.message;
          showMessage(successMessage, "success");
          form.reset();
          if (result.user) {
            const modeLabels = {
              decouverte: "Mode decouverte",
              professionnel: "Professionnel de sant\u00e9"
            };
            const mode = result.user.currentMode || localStorage.getItem("studiodonthoMobileMode") || "decouverte";
            localStorage.setItem("studiodonthoMobileMode", mode);
            localStorage.setItem("studiodonthoMobileProfile", JSON.stringify({
              userId: result.user.id,
              prenom: result.user.prenom,
              mode: modeLabels[mode] || modeLabels.decouverte,
              currentMode: mode,
              isGuest: Boolean(result.user.isGuest)
            }));
            if (window.navigateWithMobileTransition) {
              window.navigateWithMobileTransition("profilmobil.html", { fullPage: true });
            } else {
              window.location.href = "profilmobil.html";
            }
          }
        } catch (error) {
          showMessage(error.message, "error");
        } finally {
          button.disabled = false;
          button.textContent = defaultText;
        }
      });

      forgotOpenButton.addEventListener("click", showForgotForm);
      backToLoginButton.addEventListener("click", showLoginForm);

      forgotForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const button = forgotForm.querySelector(".submit-button");
        const defaultText = button.textContent;

        button.disabled = true;
        button.textContent = "Envoi...";
        showMessage("");

        try {
          const result = await sendJsonRequest("/api/forgot-password", Object.fromEntries(new FormData(forgotForm).entries()));
          showMessage(result.message, "success");
          forgotForm.reset();
        } catch (error) {
          showMessage(error.message, "error");
        } finally {
          button.disabled = false;
          button.textContent = defaultText;
        }
      });
    </script>
    <script src="js/mobile-transition.js"></script>
  </body>
</html>
