<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>1m1c4l3p2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "content"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="css/mobile-core.css" />
    <link rel="stylesheet" href="css/mobile-transition.css" />
    <link rel="stylesheet" href="css/dam-technique-mobile.css" />
  </head>
  <body data-requires-auth="true">
    <main
      class="phone dam-technique-page"
      aria-label="Petit test de technique de digue en video"
      data-lesson-page
      data-lesson-mode="professionnel"
      data-lesson-world="1"
      data-lesson-path="4"
      data-lesson-key="1m1c4l3"
    >
      <section class="content">
        <a class="top-link back-link" href="1m1c4l3p1.html" aria-label="Retour">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <a
          class="top-link next-link recap-finish-link"
          id="next-dam-page"
          href="cheminmobil.html?world=1&id=4"
          aria-label="Chemin suivant"
          data-complete-lesson
          hidden
        >
          Chemin suivant
        </a>
        <span class="page-number">2/2</span>

        <article
          class="sequence-panel"
          data-technique-quiz
          data-correct-message="Bien joue : c'est la technique parachute."
          data-wrong-message="Dommage : dans cette video, la bonne reponse est la technique parachute."
        >
          <h1>Petit test : analyse la video</h1>
          <p class="sequence-intro">Regarde la pose de digue puis choisis la technique utilisee.</p>

          <div class="video-analysis-card" data-video-player>
            <button
              class="video-play-button"
              type="button"
              aria-label="Lire la video"
              data-video-id="Or1i2sFP_NA"
            ></button>
          </div>

          <p class="technique-question">C'est quelle technique ?</p>

          <div class="technique-options" aria-label="Solutions possibles">
            <button class="technique-answer" type="button">Technique directe</button>
            <button class="technique-answer" type="button" data-correct="true">Technique parachute</button>
            <button class="technique-answer" type="button">Technique a ailettes</button>
            <button class="technique-answer" type="button">Digue plurale</button>
          </div>

          <p class="dam-feedback" data-technique-feedback>Choisis la technique correspondante.</p>
        </article>
      </section>

      <footer class="footer-nav" aria-label="Navigation mobile">
        <a class="active" href="entrainementmobil.html" aria-label="Entrainement">
          <img class="footer-icon-img" src="/img/entrainement.png" alt="" />
        </a>
        <a href="coursmobil.html" aria-label="Cours">
          <img class="footer-icon-img" src="/img/cours.png" alt="" />
        </a>
        <a href="profilmobil.html" aria-label="Profil">
          <i class="fa-solid fa-user"></i>
        </a>
        <a href="classementmobil.html" aria-label="Classement">
          <img class="footer-icon-img" src="/img/classement.png" alt="" />
        </a>
        <a href="#" aria-label="Menu">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </a>
      </footer>
    </main>

    <script src="js/dam-technique-mobile.js"></script>
    <script src="js/path-progress-mobile.js"></script>
    <script src="js/mobile-transition.js"></script>
  </body>
</html>
