<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>m1c1l1p2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "content"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="mobile-transition.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #d9f0f7;
        font-family: Arial, Helvetica, sans-serif;
      }

      .phone {
        position: relative;
        width: min(100vw, 201px);
        height: min(100vh, 395px);
        overflow: hidden;
        background: #2f80ed;
        border-radius: 11px;
        box-shadow: 0 18px 36px rgba(8, 47, 127, 0.3);
      }

      .content {
        position: absolute;
        inset: 0 0 36px;
        padding: 19px 13px 0;
        color: #ffffff;
      }

      .top-link {
        position: absolute;
        top: 19px;
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        color: #ffffff;
        background: #58cc02;
        border-radius: 50%;
        font-size: 10px;
        text-decoration: none;
        box-shadow: 0 3px 0 #46a302;
      }

      .back-link {
        left: 13px;
      }

      .next-link {
        right: 13px;
      }

      .page-number {
        position: absolute;
        top: 23px;
        left: 50%;
        transform: translateX(-50%);
        padding: 3px 8px;
        color: #ffffff;
        background: rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        font-size: 7px;
        font-weight: 900;
        line-height: 1;
      }

      .lesson-title {
        margin: 32px 0 0;
        color: #ffffff;
        font-size: 13.5px;
        font-weight: 900;
        line-height: 1.15;
        text-align: center;
      }

      .lesson-scene {
        position: absolute;
        left: 13px;
        right: 13px;
        top: 155px;
        bottom: 10px;
      }

      .speech-bubble {
        position: absolute;
        top: 50px;
        right: -5px;
        z-index: 2;
        width: calc(100% - 45px);
        min-height: 122px;
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 7px;
        padding: 10px 9px 8px;
        color: #082f7f;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 7px 14px rgba(8, 47, 127, 0.16);
        overflow: hidden;
      }

      .lesson-text-window {
        align-self: center;
        min-height: 78px;
        display: grid;
        align-items: center;
        overflow: hidden;
      }

      .speech-bubble p {
        margin: 0;
        color: #31527f;
        font-size: 6.6px;
        font-weight: 900;
        line-height: 1.28;
        text-align: left;
      }

      .speech-bubble strong {
        color: #082f7f;
        font-size: 8.6px;
        font-weight: 1000;
      }

      .lesson-text-slide-out-left {
        animation: lessonTextSlideOutLeft 160ms ease forwards;
      }

      .lesson-text-slide-out-right {
        animation: lessonTextSlideOutRight 160ms ease forwards;
      }

      .lesson-text-slide-in-left {
        animation: lessonTextSlideInLeft 190ms ease forwards;
      }

      .lesson-text-slide-in-right {
        animation: lessonTextSlideInRight 190ms ease forwards;
      }

      @keyframes lessonTextSlideOutLeft {
        to {
          opacity: 0;
          transform: translateX(-120%);
        }
      }

      @keyframes lessonTextSlideOutRight {
        to {
          opacity: 0;
          transform: translateX(120%);
        }
      }

      @keyframes lessonTextSlideInLeft {
        from {
          opacity: 0;
          transform: translateX(-120%);
        }

        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes lessonTextSlideInRight {
        from {
          opacity: 0;
          transform: translateX(120%);
        }

        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .lesson-switch {
        display: grid;
        grid-template-columns: 22px 1fr 22px;
        align-items: center;
        gap: 5px;
      }

      .lesson-switch button {
        width: 22px;
        height: 20px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 8px;
        color: #ffffff;
        background: #58cc02;
        box-shadow: 0 2px 0 #46a302;
        font-size: 8px;
        cursor: pointer;
      }

      .lesson-switch button:disabled {
        background: #aeb8c5;
        box-shadow: 0 2px 0 #8b98a8;
        cursor: not-allowed;
      }

      .lesson-counter {
        color: #082f7f;
        font-size: 7px;
        font-weight: 900;
        text-align: center;
      }

      .tooth-character {
        position: absolute;
        left: 0;
        bottom: 0;
        z-index: 2;
        width: 38px;
        max-height: 40px;
        object-fit: contain;
        filter: drop-shadow(0 8px 10px rgba(8, 47, 127, 0.24));
      }

      .bubble-trail {
        position: absolute;
        left: 28px;
        bottom: 33px;
        z-index: 1;
        width: 34px;
        height: 92px;
        pointer-events: none;
      }

      .bubble-trail span {
        position: absolute;
        display: block;
        background: #ffffff;
        border-radius: 50%;
        box-shadow: 0 4px 8px rgba(8, 47, 127, 0.12);
      }

      .bubble-trail span:nth-child(1) {
        left: 5px;
        bottom: -3px;
        width: 7px;
        height: 7px;
      }

      .bubble-trail span:nth-child(2) {
        left: 14px;
        bottom: 0px;
        width: 8px;
        height: 8px;
      }

      .footer-nav {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 36px;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        align-items: center;
        background: #ffffff;
        border-top: 1px solid #e5e7eb;
        box-shadow: 0 -4px 10px rgba(8, 47, 127, 0.08);
      }

      .footer-nav a {
        height: 100%;
        display: grid;
        place-items: center;
        color: #4b5563;
        font-size: 12px;
        text-decoration: none;
      }

      .footer-nav a.active {
        color: #00a6a6;
      }

      .footer-icon-img {
        width: 14px;
        height: 14px;
        object-fit: contain;
        opacity: 0.78;
      }

      .footer-nav a.active .footer-icon-img {
        opacity: 1;
        filter: brightness(0) saturate(100%) invert(42%) sepia(95%) saturate(851%) hue-rotate(142deg) brightness(91%) contrast(101%);
      }

      @media (min-width: 520px) {
        .phone {
          transform: scale(1.45);
        }
      }
    </style>
  </head>
  <body data-requires-auth="true">
    <main class="phone" aria-label="Différence entre odontologue et dentiste">
      <section class="content">
        <a class="top-link back-link" href="m1c1l1p1.html" aria-label="Retour">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <a class="top-link next-link" href="m1c1l1p3.html" aria-label="Page suivante">
          <i class="fa-solid fa-arrow-right"></i>
        </a>
        <span class="page-number">2/6</span>

        <h1 class="lesson-title">Quelle est la différence entre un odontologue et un dentiste ?</h1>

        <div class="lesson-scene">
          <img class="tooth-character" src="/img/neutre.png" alt="" />
          <span class="bubble-trail" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
          <article class="speech-bubble">
            <div class="lesson-text-window">
              <p id="lesson-text"></p>
            </div>
            <div class="lesson-switch">
              <button type="button" id="previous-text" aria-label="Texte précédent">
                <i class="fa-solid fa-chevron-left"></i>
              </button>
              <span class="lesson-counter" id="lesson-counter">1/2</span>
              <button type="button" id="next-text" aria-label="Texte suivant">
                <i class="fa-solid fa-chevron-right"></i>
              </button>
            </div>
          </article>
        </div>
      </section>

      <footer class="footer-nav" aria-label="Navigation mobile">
        <a class="active" href="entrainementmobil.html" aria-label="Entrainement">
          <img class="footer-icon-img" src="/img/entrainement.png" alt="" />
        </a>
        <a href="coursmobil.html" aria-label="Cours">
          <img class="footer-icon-img" src="/img/cours.png" alt="" />
        </a>
        <a href="profilmobil.html" aria-label="Profil">
          <i class="fa-solid fa-user"></i>
        </a>
        <a href="classementmobil.html" aria-label="Classement">
          <img class="footer-icon-img" src="/img/classement.png" alt="" />
        </a>
        <a href="#" aria-label="Menu">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </a>
      </footer>
    </main>

    <script>
      const lessonTexts = [
        "Un <strong>dentiste</strong> est un professionnel formé pour diagnostiquer et soigner les problèmes dentaires courants, comme les caries, les maladies des gencives, les extractions ou les nettoyages.",
        "Un <strong>odontologue</strong> est un <strong>dentiste</strong> qui a suivi une formation spécialisée dans un domaine précis, comme l’orthodontie, la chirurgie buccale, l’endodontie ou l’odontopédiatrie."
      ];
      const lessonText = document.querySelector("#lesson-text");
      const lessonCounter = document.querySelector("#lesson-counter");
      const previousButton = document.querySelector("#previous-text");
      const nextButton = document.querySelector("#next-text");
      let currentTextIndex = 0;
      let isTextAnimating = false;

      function renderLessonText() {
        lessonText.innerHTML = lessonTexts[currentTextIndex];
        lessonCounter.textContent = `${currentTextIndex + 1}/${lessonTexts.length}`;
        previousButton.disabled = currentTextIndex === 0;
        nextButton.disabled = currentTextIndex === lessonTexts.length - 1;
      }

      function switchLessonText(nextIndex, direction) {
        if (isTextAnimating || nextIndex === currentTextIndex) {
          return;
        }

        isTextAnimating = true;
        previousButton.disabled = true;
        nextButton.disabled = true;

        const outClass = direction === "next" ? "lesson-text-slide-out-left" : "lesson-text-slide-out-right";
        const inClass = direction === "next" ? "lesson-text-slide-in-right" : "lesson-text-slide-in-left";

        lessonText.classList.remove(
          "lesson-text-slide-out-left",
          "lesson-text-slide-out-right",
          "lesson-text-slide-in-left",
          "lesson-text-slide-in-right"
        );
        lessonText.classList.add(outClass);

        window.setTimeout(() => {
          currentTextIndex = nextIndex;
          lessonText.innerHTML = lessonTexts[currentTextIndex];
          lessonCounter.textContent = `${currentTextIndex + 1}/${lessonTexts.length}`;
          lessonText.classList.remove(outClass);
          lessonText.classList.add(inClass);

          window.setTimeout(() => {
            lessonText.classList.remove(inClass);
            isTextAnimating = false;
            renderLessonText();
          }, 190);
        }, 160);
      }

      previousButton.addEventListener("click", () => {
        switchLessonText(Math.max(0, currentTextIndex - 1), "previous");
      });

      nextButton.addEventListener("click", () => {
        switchLessonText(Math.min(lessonTexts.length - 1, currentTextIndex + 1), "next");
      });

      renderLessonText();
    </script>
    <script src="mobile-transition.js"></script>
  </body>
</html>
