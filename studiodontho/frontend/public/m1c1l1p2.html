<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>m1c1l1p2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "content"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="css/mobile-core.css" />
    <link rel="stylesheet" href="css/mobile-transition.css" />
    <link rel="stylesheet" href="css/lesson-mobile.css" />
  </head>
  <body data-requires-auth="true">
    <main class="phone lesson-switch-page" aria-label="Différence entre odontologue et dentiste">
      <section class="content">
        <a class="top-link back-link" href="m1c1l1p1.html" aria-label="Retour">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <span class="page-number">2/2</span>

        <h1 class="lesson-title">Quelle est la différence entre un odontologue et un dentiste ?</h1>

        <div class="lesson-scene">
          <img class="tooth-character" src="/img/neutre.png" alt="" />
          <span class="bubble-trail" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
          <article class="speech-bubble">
            <div class="lesson-text-window">
              <p id="lesson-text"></p>
            </div>
            <div class="lesson-switch">
              <button type="button" id="previous-text" aria-label="Texte précédent">
                <i class="fa-solid fa-chevron-left"></i>
              </button>
              <span class="lesson-counter" id="lesson-counter">1/2</span>
              <button type="button" id="next-text" aria-label="Texte suivant">
                <i class="fa-solid fa-chevron-right"></i>
              </button>
            </div>
          </article>
        </div>
      </section>

      <footer class="footer-nav" aria-label="Navigation mobile">
        <a class="active" href="entrainementmobil.html" aria-label="Entrainement">
          <img class="footer-icon-img" src="/img/entrainement.png" alt="" />
        </a>
        <a href="coursmobil.html" aria-label="Cours">
          <img class="footer-icon-img" src="/img/cours.png" alt="" />
        </a>
        <a href="profilmobil.html" aria-label="Profil">
          <i class="fa-solid fa-user"></i>
        </a>
        <a href="classementmobil.html" aria-label="Classement">
          <img class="footer-icon-img" src="/img/classement.png" alt="" />
        </a>
        <a href="#" aria-label="Menu">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </a>
      </footer>
    </main>

    <script>
      const lessonTexts = [
        "Un <strong>dentiste</strong> est un professionnel formé pour diagnostiquer et soigner les problèmes dentaires courants, comme les caries, les maladies des gencives, les extractions ou les nettoyages.",
        "Un <strong>odontologue</strong> est un <strong>dentiste</strong> qui a suivi une formation spécialisée dans un domaine précis, comme l’orthodontie, la chirurgie buccale, l’endodontie ou l’odontopédiatrie."
      ];
      const lessonText = document.querySelector("#lesson-text");
      const lessonCounter = document.querySelector("#lesson-counter");
      const previousButton = document.querySelector("#previous-text");
      const nextButton = document.querySelector("#next-text");
      let currentTextIndex = 0;
      let isTextAnimating = false;

      function renderLessonText() {
        lessonText.innerHTML = lessonTexts[currentTextIndex];
        lessonCounter.textContent = `${currentTextIndex + 1}/${lessonTexts.length}`;
        previousButton.disabled = currentTextIndex === 0;
        nextButton.disabled = currentTextIndex === lessonTexts.length - 1;
      }

      function switchLessonText(nextIndex, direction) {
        if (isTextAnimating || nextIndex === currentTextIndex) {
          return;
        }

        isTextAnimating = true;
        previousButton.disabled = true;
        nextButton.disabled = true;

        const outClass = direction === "next" ? "lesson-text-slide-out-left" : "lesson-text-slide-out-right";
        const inClass = direction === "next" ? "lesson-text-slide-in-right" : "lesson-text-slide-in-left";

        lessonText.classList.remove(
          "lesson-text-slide-out-left",
          "lesson-text-slide-out-right",
          "lesson-text-slide-in-left",
          "lesson-text-slide-in-right"
        );
        lessonText.classList.add(outClass);

        window.setTimeout(() => {
          currentTextIndex = nextIndex;
          lessonText.innerHTML = lessonTexts[currentTextIndex];
          lessonCounter.textContent = `${currentTextIndex + 1}/${lessonTexts.length}`;
          lessonText.classList.remove(outClass);
          lessonText.classList.add(inClass);

          window.setTimeout(() => {
            lessonText.classList.remove(inClass);
            isTextAnimating = false;
            renderLessonText();
          }, 190);
        }, 160);
      }

      previousButton.addEventListener("click", () => {
        switchLessonText(Math.max(0, currentTextIndex - 1), "previous");
      });

      nextButton.addEventListener("click", () => {
        switchLessonText(Math.min(lessonTexts.length - 1, currentTextIndex + 1), "next");
      });

      renderLessonText();
    </script>
    <script>
      const finishLesson = document.querySelector("#finish-lesson");

      finishLesson.addEventListener("click", (event) => {
        event.preventDefault();

        if (window.navigateWithMobileTransition) {
          window.navigateWithMobileTransition("cheminmobil.html?world=1&id=1");
        } else {
          window.location.href = "cheminmobil.html?world=1&id=1";
        }
      });
    </script>
    <script src="js/mobile-transition.js"></script>
  </body>
</html>
