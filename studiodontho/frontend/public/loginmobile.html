<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loginmobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "page"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="css/mobile-core.css" />
    <link rel="stylesheet" href="css/mobile-transition.css" />
    <link rel="stylesheet" href="css/auth-mobile.css" />
    <link rel="stylesheet" href="css/pages/loginmobile.css" />
  </head>
  <body data-mobile-auth="true">
    <main class="phone phone--light" aria-label="Connexion mobile Studiodontho">
      <a class="back-button" href="page2mobil.html" aria-label="Retour">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <div class="status-bar" aria-hidden="true"></div>
      <section class="login-panel">
        <header class="mobile-header">
          <h1>Studiodontho</h1>
        </header>
        <div class="choice-tabs" aria-label="Choix du mode de connexion">
          <button class="choice-button active" type="button" data-panel="signup">
            Cr&eacute;er
          </button>
          <button class="choice-button" type="button" data-panel="login">
            Connexion
          </button>
          <button class="choice-button" type="button" data-panel="guest">
            Invit&eacute;
          </button>
        </div>
        <p class="auth-message" id="auth-message" role="status"></p>
        <div class="auth-content">
          <form class="auth-form active" id="signup" action="#" method="post">
            <h2>Commence ton parcours</h2>
            <label for="signup-name">Pr&eacute;nom</label>
            <input id="signup-name" name="prenom" type="text" placeholder="Ton prenom" autocomplete="given-name" maxlength="100" required />
            <label for="signup-email">Email</label>
            <input id="signup-email" name="email" type="email" placeholder="exemple@mail.com" autocomplete="email" maxlength="255" required />
            <label for="signup-password">Mot de passe</label>
            <div class="password-field">
              <input id="signup-password" name="password" type="password" placeholder="8 caracteres minimum" autocomplete="new-password" minlength="8" required />
              <button class="password-toggle" type="button" aria-label="Afficher le mot de passe" data-target="signup-password">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
            <button class="submit-button" type="submit">Commencer</button>
          </form>
          <form class="auth-form" id="login" action="#" method="post">
            <h2>Bon retour</h2>
            <label for="login-email">Email</label>
            <input id="login-email" name="email" type="email" placeholder="exemple@mail.com" autocomplete="email" maxlength="255" required />
            <label for="login-password">Mot de passe</label>
            <div class="password-field">
              <input id="login-password" name="password" type="password" placeholder="Ton mot de passe" autocomplete="current-password" required />
              <button class="password-toggle" type="button" aria-label="Afficher le mot de passe" data-target="login-password">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
            <button class="submit-button" type="submit">Connexion</button>
            <button class="link-button" id="forgot-open" type="button">Mot de passe oubli&eacute; ?</button>
          </form>
          <form class="auth-form" id="forgot" action="#" method="post">
            <h2>Mot de passe oubli&eacute;</h2>
            <p class="form-help">
              Entre l'adresse mail de ton compte pour recevoir un lien.
            </p>
            <label for="forgot-email">Email</label>
            <input id="forgot-email" name="email" type="email" placeholder="exemple@mail.com" autocomplete="email" maxlength="255" required />
            <button class="submit-button" type="submit">Envoyer</button>
            <button class="link-button" id="back-to-login" type="button">Retour connexion</button>
          </form>
          <form class="auth-form guest-panel" id="guest" action="#" method="post">
            <h2>Connexion invit&eacute;</h2>
            <p>
              attention ton compte ne sera pas relier.
            </p>
            <label for="guest-name">Pr&eacute;nom</label>
            <input id="guest-name" name="prenom" type="text" placeholder="Ton prenom" autocomplete="given-name" maxlength="100" required />
            <button class="submit-button" type="submit">Continuer</button>
          </form>
        </div>
      </section>
    </main>
    <script src="js/app.js"></script>
    <script src="js/mobile-transition.js"></script>
  </body>
</html>
