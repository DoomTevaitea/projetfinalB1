<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loginmobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "page"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="mobile-transition.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #d9f0f7;
        color: #082f7f;
        font-family: Arial, Helvetica, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .phone {
        position: relative;
        width: min(100vw, 201px);
        height: min(100vh, 395px);
        overflow: hidden;
        background: #9edceb;
        border-radius: 11px;
        box-shadow: 0 18px 36px rgba(8, 47, 127, 0.3);
      }

      .status-bar {
        height: 18px;
      }

      .back-button {
        position: absolute;
        top: 9px;
        left: 9px;
        z-index: 3;
        width: 20px;
        height: 20px;
        display: grid;
        place-items: center;
        color: #ffffff;
        background: #58cc02;
        border-radius: 50%;
        box-shadow: none;
        text-decoration: none;
      }

      .back-button i {
        font-size: 9px;
        line-height: 1;
      }

      .login-panel {
        height: calc(100% - 18px);
        display: grid;
        grid-template-rows: auto auto auto minmax(0, 1fr);
        gap: 7px;
        padding: 15px 10px 10px;
      }

      .mobile-header {
        display: grid;
        justify-items: center;
        gap: 4px;
        text-align: center;
      }

      .mobile-header h1 {
        margin: 0 0 3px;
        color: #082f7f;
        font-size: 20px;
        font-weight: 900;
        line-height: 1;
      }

      .choice-tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
      }

      .choice-button {
        min-height: 28px;
        padding: 5px 3px;
        color: #082f7f;
        background: #ffffff;
        border: 0;
        border-radius: 8px;
        box-shadow: 0 2px 0 rgba(8, 47, 127, 0.14);
        font-size: 7.2px;
        font-weight: 900;
        line-height: 1.05;
      }

      .choice-button.active {
        color: #ffffff;
        background: #00a6a6;
        box-shadow: 0 2px 0 #008585;
      }

      .auth-message {
        min-height: 14px;
        margin: 0;
        color: #4f6176;
        font-size: 7px;
        font-weight: 800;
        line-height: 1.25;
        text-align: center;
      }

      .auth-message.success {
        color: #347a02;
      }

      .auth-message.error {
        color: #c24141;
      }

      .auth-content {
        min-height: 0;
        overflow-y: auto;
        padding: 9px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(8, 47, 127, 0.1);
        border-radius: 10px;
        box-shadow: 0 8px 16px rgba(8, 47, 127, 0.12);
      }

      .auth-content::-webkit-scrollbar {
        width: 0;
      }

      .auth-form {
        display: none;
      }

      .auth-form.active {
        display: grid;
      }

      .auth-form h2 {
        margin: 0 0 8px;
        color: #082f7f;
        font-size: 13px;
        font-weight: 900;
        line-height: 1.12;
      }

      label {
        display: block;
        margin-bottom: 3px;
        color: #082f7f;
        font-size: 7.5px;
        font-weight: 900;
      }

      input {
        display: block;
        width: 100%;
        min-height: 28px;
        margin-bottom: 7px;
        padding: 7px 8px;
        color: #102033;
        background: #f5f7fa;
        border: 1.5px solid #e5e7eb;
        border-radius: 8px;
        outline: none;
        font-size: 8px;
        font-weight: 800;
      }

      input::placeholder {
        color: #6b7280;
      }

      input:focus {
        background: #ffffff;
        border-color: #2ec4b6;
        box-shadow: 0 0 0 3px rgba(46, 196, 182, 0.14);
      }

      .password-field {
        position: relative;
        margin-bottom: 7px;
      }

      .password-field input {
        margin-bottom: 0;
        padding-right: 30px;
      }

      .password-toggle {
        position: absolute;
        top: 50%;
        right: 4px;
        width: 23px;
        height: 23px;
        display: grid;
        place-items: center;
        color: #6b7280;
        background: transparent;
        border: 0;
        border-radius: 7px;
        transform: translateY(-50%);
      }

      .password-toggle i {
        font-size: 10px;
        line-height: 1;
      }

      .submit-button {
        width: 100%;
        min-height: 31px;
        margin-top: 2px;
        color: #ffffff;
        background: #58cc02;
        border: 0;
        border-radius: 8px;
        box-shadow: 0 2px 0 #46a302;
        font-size: 9px;
        font-weight: 900;
      }

      .link-button {
        width: 100%;
        min-height: 25px;
        margin-top: 5px;
        color: #082f7f;
        background: transparent;
        border: 0;
        font-size: 7.5px;
        font-weight: 900;
      }

      .form-help,
      .guest-panel p {
        margin: 0 0 9px;
        color: #213c61;
        font-size: 8px;
        font-weight: 800;
        line-height: 1.35;
      }

      @media (min-width: 520px) {
        .phone {
          transform: scale(1.45);
        }
      }
    </style>
  </head>
  <body data-mobile-auth="true">
    <main class="phone" aria-label="Connexion mobile Studiodontho">
      <a class="back-button" href="page2mobil.html" aria-label="Retour">
        <i class="fa-solid fa-arrow-left"></i>
      </a>

      <div class="status-bar" aria-hidden="true"></div>

      <section class="login-panel">
        <header class="mobile-header">
          <h1>Studiodontho</h1>
        </header>

        <div class="choice-tabs" aria-label="Choix du mode de connexion">
          <button class="choice-button active" type="button" data-panel="signup">
            Cr&eacute;er
          </button>
          <button class="choice-button" type="button" data-panel="login">
            Connexion
          </button>
          <button class="choice-button" type="button" data-panel="guest">
            Invit&eacute;
          </button>
        </div>

        <p class="auth-message" id="auth-message" role="status"></p>

        <div class="auth-content">
          <form class="auth-form active" id="signup" action="#" method="post">
            <h2>Commence ton parcours</h2>

            <label for="signup-name">Pr&eacute;nom</label>
            <input id="signup-name" name="prenom" type="text" placeholder="Ton prenom" autocomplete="given-name" maxlength="100" required />

            <label for="signup-email">Email</label>
            <input id="signup-email" name="email" type="email" placeholder="exemple@mail.com" autocomplete="email" maxlength="255" required />

            <label for="signup-password">Mot de passe</label>
            <div class="password-field">
              <input id="signup-password" name="password" type="password" placeholder="8 caracteres minimum" autocomplete="new-password" minlength="8" required />
              <button class="password-toggle" type="button" aria-label="Afficher le mot de passe" data-target="signup-password">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>

            <button class="submit-button" type="submit">Commencer</button>
          </form>

          <form class="auth-form" id="login" action="#" method="post">
            <h2>Bon retour</h2>

            <label for="login-email">Email</label>
            <input id="login-email" name="email" type="email" placeholder="exemple@mail.com" autocomplete="email" maxlength="255" required />

            <label for="login-password">Mot de passe</label>
            <div class="password-field">
              <input id="login-password" name="password" type="password" placeholder="Ton mot de passe" autocomplete="current-password" required />
              <button class="password-toggle" type="button" aria-label="Afficher le mot de passe" data-target="login-password">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>

            <button class="submit-button" type="submit">Connexion</button>
            <button class="link-button" id="forgot-open" type="button">Mot de passe oubli&eacute; ?</button>
          </form>

          <form class="auth-form" id="forgot" action="#" method="post">
            <h2>Mot de passe oubli&eacute;</h2>

            <p class="form-help">
              Entre l'adresse mail de ton compte pour recevoir un lien.
            </p>

            <label for="forgot-email">Email</label>
            <input id="forgot-email" name="email" type="email" placeholder="exemple@mail.com" autocomplete="email" maxlength="255" required />

            <button class="submit-button" type="submit">Envoyer</button>
            <button class="link-button" id="back-to-login" type="button">Retour connexion</button>
          </form>

          <form class="auth-form guest-panel" id="guest" action="#" method="post">
            <h2>Connexion invit&eacute;</h2>
            <p>
              attention ton compte ne sera pas relier.
            </p>

            <label for="guest-name">Pr&eacute;nom</label>
            <input id="guest-name" name="prenom" type="text" placeholder="Ton prenom" autocomplete="given-name" maxlength="100" required />

            <button class="submit-button" type="submit">Continuer</button>
          </form>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
    <script src="mobile-transition.js"></script>
  </body>
</html>
