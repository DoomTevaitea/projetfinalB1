<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>reset-password-mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "page"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="css/mobile-core.css" />
    <link rel="stylesheet" href="css/mobile-transition.css" />
    <link rel="stylesheet" href="css/auth-mobile.css" />
    <link rel="stylesheet" href="css/pages/reset-password.css" />
  </head>
  <body>
    <main class="phone phone--light" aria-label="Reinitialisation mobile Studiodontho">
      <a class="back-button" href="connexionmobile.html" aria-label="Retour">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <section class="reset-panel">
        <header class="mobile-header">
          <h1>Nouveau mot de passe</h1>
          <p>Choisis un mot de passe facile a retenir, mais difficile a deviner.</p>
        </header>
        <p class="auth-message" id="reset-message" role="status"></p>
        <form class="reset-card" id="reset-form" action="#" method="post">
          <h2>Reinitialiser</h2>
          <label for="reset-password">Nouveau mot de passe</label>
          <div class="password-field">
            <input id="reset-password" name="password" type="password" placeholder="8 caracteres minimum" autocomplete="new-password" minlength="8" required />
            <button class="password-toggle" type="button" aria-label="Afficher le mot de passe" data-target="reset-password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <label for="reset-confirm-password">Confirmer le mot de passe</label>
          <div class="password-field">
            <input id="reset-confirm-password" name="confirmPassword" type="password" placeholder="Retape ton mot de passe" autocomplete="new-password" minlength="8" required />
            <button class="password-toggle" type="button" aria-label="Afficher le mot de passe" data-target="reset-confirm-password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <button class="submit-button" type="submit">Changer le mot de passe</button>
          <a class="link-button" href="connexionmobile.html">Retour a la connexion</a>
        </form>
      </section>
    </main>
    <script src="js/reset-password.js"></script>
    <script src="js/mobile-transition.js"></script>
  </body>
</html>
