<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>reset-password-mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "page"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="mobile-transition.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #d9f0f7;
        color: #082f7f;
        font-family: Arial, Helvetica, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .phone {
        position: relative;
        width: min(100vw, 201px);
        height: min(100vh, 395px);
        overflow: hidden;
        background: #9edceb;
        border-radius: 11px;
        box-shadow: 0 18px 36px rgba(8, 47, 127, 0.3);
      }

      .back-button {
        position: absolute;
        top: 9px;
        left: 9px;
        z-index: 3;
        width: 20px;
        height: 20px;
        display: grid;
        place-items: center;
        color: #ffffff;
        background: #58cc02;
        border-radius: 50%;
        text-decoration: none;
      }

      .back-button i {
        font-size: 9px;
        line-height: 1;
      }

      .reset-panel {
        height: 100%;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 12px;
        padding: 35px 10px 10px;
      }

      .mobile-header {
        display: grid;
        justify-items: center;
        gap: 7px;
        text-align: center;
      }

      .mobile-header h1 {
        margin: 0;
        color: #082f7f;
        font-size: 18px;
        font-weight: 900;
        line-height: 1.05;
      }

      .mobile-header p {
        width: 150px;
        margin: 0;
        color: #213c61;
        font-size: 7.5px;
        font-weight: 800;
        line-height: 1.35;
      }

      .auth-message {
        min-height: 16px;
        margin: 0;
        color: #4f6176;
        font-size: 7.5px;
        font-weight: 800;
        line-height: 1.25;
        text-align: center;
      }

      .auth-message.success {
        color: #347a02;
      }

      .auth-message.error {
        color: #c24141;
      }

      .reset-card {
        align-self: start;
        padding: 13px 10px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(8, 47, 127, 0.1);
        border-radius: 10px;
        box-shadow: 0 8px 16px rgba(8, 47, 127, 0.12);
      }

      .reset-card h2 {
        margin: 0 0 11px;
        color: #082f7f;
        font-size: 15px;
        font-weight: 900;
        line-height: 1.1;
        text-align: center;
      }

      label {
        display: block;
        margin-bottom: 4px;
        color: #082f7f;
        font-size: 8px;
        font-weight: 900;
      }

      input {
        display: block;
        width: 100%;
        min-height: 31px;
        margin-bottom: 9px;
        padding: 7px 8px;
        color: #102033;
        background: #f5f7fa;
        border: 1.5px solid #e5e7eb;
        border-radius: 8px;
        outline: none;
        font-size: 8px;
        font-weight: 800;
      }

      input:focus {
        background: #ffffff;
        border-color: #2ec4b6;
        box-shadow: 0 0 0 3px rgba(46, 196, 182, 0.14);
      }

      .password-field {
        position: relative;
        margin-bottom: 9px;
      }

      .password-field input {
        margin-bottom: 0;
        padding-right: 30px;
      }

      .password-toggle {
        position: absolute;
        top: 50%;
        right: 4px;
        width: 23px;
        height: 23px;
        display: grid;
        place-items: center;
        color: #6b7280;
        background: transparent;
        border: 0;
        border-radius: 7px;
        transform: translateY(-50%);
      }

      .password-toggle i {
        font-size: 10px;
        line-height: 1;
      }

      .submit-button,
      .link-button {
        width: 100%;
        min-height: 32px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 8px;
        font-size: 8.5px;
        font-weight: 900;
        text-decoration: none;
      }

      .submit-button {
        color: #ffffff;
        background: #58cc02;
        box-shadow: 0 2px 0 #46a302;
      }

      .link-button {
        margin-top: 7px;
        color: #082f7f;
        background: transparent;
      }

      @media (min-width: 520px) {
        .phone {
          transform: scale(1.45);
        }
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="Reinitialisation mobile Studiodontho">
      <a class="back-button" href="connexionmobile.html" aria-label="Retour">
        <i class="fa-solid fa-arrow-left"></i>
      </a>

      <section class="reset-panel">
        <header class="mobile-header">
          <h1>Nouveau mot de passe</h1>
          <p>Choisis un mot de passe facile a retenir, mais difficile a deviner.</p>
        </header>

        <p class="auth-message" id="reset-message" role="status"></p>

        <form class="reset-card" id="reset-form" action="#" method="post">
          <h2>Reinitialiser</h2>

          <label for="reset-password">Nouveau mot de passe</label>
          <div class="password-field">
            <input id="reset-password" name="password" type="password" placeholder="8 caracteres minimum" autocomplete="new-password" minlength="8" required />
            <button class="password-toggle" type="button" aria-label="Afficher le mot de passe" data-target="reset-password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <label for="reset-confirm-password">Confirmer le mot de passe</label>
          <div class="password-field">
            <input id="reset-confirm-password" name="confirmPassword" type="password" placeholder="Retape ton mot de passe" autocomplete="new-password" minlength="8" required />
            <button class="password-toggle" type="button" aria-label="Afficher le mot de passe" data-target="reset-confirm-password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <button class="submit-button" type="submit">Changer le mot de passe</button>
          <a class="link-button" href="connexionmobile.html">Retour a la connexion</a>
        </form>
      </section>
    </main>

    <script src="reset-password.js"></script>
    <script src="mobile-transition.js"></script>
  </body>
</html>
