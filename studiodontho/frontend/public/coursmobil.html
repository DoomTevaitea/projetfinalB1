<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>coursmobil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "page"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="css/mobile-core.css" />
    <link rel="stylesheet" href="css/mobile-transition.css" />
    <link rel="stylesheet" href="css/pages/coursmobil.css" />
  </head>
  <body data-requires-auth="true">
    <main class="phone" aria-label="Cours mobile Studiodontho">
      <section class="courses-screen" aria-label="Fiches pratiques debloquees">
        <header class="courses-header">
          <div>
            <p id="course-mode-label">Bibliotheque</p>
            <h1>Fiches pratiques</h1>
          </div>
          <span class="courses-count" id="courses-count">0</span>
        </header>

        <section class="course-section" aria-labelledby="discovery-course-title">
          <h2 id="discovery-course-title">Mode decouverte</h2>
          <div class="course-list" id="discovery-course-list"></div>
        </section>

        <section class="course-section" aria-labelledby="pro-course-title">
          <h2 id="pro-course-title">Professionnel de sante</h2>
          <div class="course-list" id="pro-course-list"></div>
        </section>
      </section>

      <footer class="footer-nav" aria-label="Navigation mobile">
        <a href="entrainementmobil.html" aria-label="Entrainement">
          <img class="footer-icon-img" src="/img/entrainement.png" alt="" />
        </a>
        <a class="active" href="coursmobil.html" aria-label="Cours">
          <img class="footer-icon-img" src="/img/cours.png" alt="" />
        </a>
        <a href="profilmobil.html" aria-label="Profil">
          <i class="fa-solid fa-user"></i>
        </a>
        <a href="classementmobil.html" aria-label="Classement">
          <img class="footer-icon-img" src="/img/classement.png" alt="" />
        </a>
        <a href="#" aria-label="Menu">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </a>
      </footer>
    </main>
    <script src="js/coursmobil.js"></script>
    <script src="js/mobile-transition.js"></script>
  </body>
</html>
