<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>coursmobil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "page"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="mobile-transition.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #d9f0f7;
        font-family: Arial, Helvetica, sans-serif;
      }

      .phone {
        position: relative;
        width: min(100vw, 201px);
        height: min(100vh, 395px);
        overflow: hidden;
        background: #9edceb;
        border-radius: 11px;
        box-shadow: 0 18px 36px rgba(8, 47, 127, 0.3);
      }

      .status-bar {
        height: 25px;
      }

      .footer-nav {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 36px;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        align-items: center;
        background: #ffffff;
        border-top: 1px solid #e5e7eb;
        box-shadow: 0 -4px 10px rgba(8, 47, 127, 0.08);
      }

      .footer-nav a {
        height: 100%;
        display: grid;
        place-items: center;
        color: #4b5563;
        font-size: 12px;
        text-decoration: none;
      }

      .footer-nav a.active {
        color: #a78ac0;
      }

      .footer-icon-img {
        width: 14px;
        height: 14px;
        object-fit: contain;
        opacity: 0.78;
      }

      .footer-nav a.active .footer-icon-img {
        opacity: 1;
        filter: brightness(0) saturate(100%) invert(68%) sepia(17%) saturate(690%) hue-rotate(232deg) brightness(87%) contrast(86%);
      }

      @media (min-width: 520px) {
        .phone {
          transform: scale(1.45);
        }
      }
    </style>
  </head>
  <body data-requires-auth="true">
    <main class="phone" aria-label="Cours mobile Studiodontho">
      <div class="status-bar" aria-hidden="true"></div>

      <footer class="footer-nav" aria-label="Navigation mobile">
        <a href="entrainementmobil.html" aria-label="Entrainement">
          <img class="footer-icon-img" src="/img/entrainement.png" alt="" />
        </a>
        <a class="active" href="coursmobil.html" aria-label="Cours">
          <img class="footer-icon-img" src="/img/cours.png" alt="" />
        </a>
        <a href="profilmobil.html" aria-label="Profil">
          <i class="fa-solid fa-user"></i>
        </a>
        <a href="classementmobil.html" aria-label="Classement">
          <img class="footer-icon-img" src="/img/classement.png" alt="" />
        </a>
        <a href="#" aria-label="Menu">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </a>
      </footer>
    </main>
    <script src="mobile-transition.js"></script>
  </body>
</html>
