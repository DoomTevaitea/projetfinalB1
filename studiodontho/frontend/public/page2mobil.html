<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>page2mobil</title>
    <script>
      document.documentElement.classList.add(`mobile-transition-${sessionStorage.getItem("studiodonthoTransitionMode") || "page"}`, "mobile-enter");
    </script>
    <link rel="stylesheet" href="mobile-transition.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #d9f0f7;
        font-family: Arial, Helvetica, sans-serif;
      }

      .phone {
        position: relative;
        width: min(100vw, 201px);
        height: min(100vh, 395px);
        overflow: hidden;
        background: #9edceb;
        border-radius: 11px;
        box-shadow: 0 18px 36px rgba(8, 47, 127, 0.3);
      }

      .status-bar {
        height: 25px;
      }

      .content {
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 34px 10px 0;
      }

      .empty-card {
        position: relative;
        overflow: hidden;
        width: 100%;
        aspect-ratio: 306 / 194;
        background: #6575e8;
        border-radius: 17px;
        box-shadow: 0 8px 16px rgba(8, 47, 127, 0.18);
        color: inherit;
        text-decoration: none;
      }

      .mode-card {
        display: grid;
        align-items: center;
        background: #58cc02;
      }

      .professional-card {
        display: grid;
        align-items: center;
        background: #2f80ed;
      }

      .mode-copy {
        position: relative;
        z-index: 1;
        width: 56%;
        padding-left: 10px;
        color: #ffffff;
      }

      .mode-copy h1 {
        margin: 0 0 5px;
        font-size: 13px;
        font-weight: 900;
        line-height: 1.08;
      }

      .mode-copy p {
        margin: 0;
        font-size: 6.8px;
        font-weight: 800;
        line-height: 1.25;
      }

      .mode-image {
        position: absolute;
        right: -2%;
        bottom: -4%;
        width: 48%;
        height: auto;
        object-fit: contain;
      }

      .professional-card .mode-image {
        left: -2%;
        right: auto;
        top: auto;
        bottom: -5%;
        width: 48%;
        transform: none;
      }

      .professional-card .mode-copy {
        position: absolute;
        top: 50%;
        right: 0;
        width: 54%;
        transform: translateY(-50%);
        padding-right: 9px;
        padding-left: 0;
        text-align: left;
      }

      .professional-card .mode-copy h1 {
        font-size: 12px;
      }

      .professional-card .mode-copy p {
        font-size: 6.5px;
      }

      .account-text {
        margin: 2px 0 0;
        color: #6b7280;
        font-size: 8px;
        font-weight: 700;
        line-height: 1.2;
        text-decoration: none;
      }

      @media (min-width: 520px) {
        .phone {
          transform: scale(1.45);
        }
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="Page mobile avec deux conteneurs">
      <div class="status-bar" aria-hidden="true"></div>

      <section class="content" aria-label="Conteneurs vides">
        <a class="empty-card mode-card" href="loginmobile.html?mode=decouverte">
          <div class="mode-copy">
            <h1>Mode decouverte</h1>
            <p>Pour ceux qui veulent d&eacute;couvrir et s'amuser</p>
          </div>
          <img class="mode-image" src="/img/decouvrir.png" alt="" />
        </a>
        <a class="empty-card professional-card" href="loginmobile.html?mode=professionnel">
          <div class="mode-copy">
            <h1>Mode Professionnel de sant&eacute;</h1>
            <p>Pour connaisseur/&eacute;tudiant qui veulent s'entrainer</p>
          </div>
          <img class="mode-image" src="/img/expert.png" alt="" />
        </a>
        <a class="account-text" href="connexionmobile.html">D&eacute;j&agrave; un compte ?</a>
      </section>
    </main>
    <script src="mobile-transition.js"></script>
  </body>
</html>
